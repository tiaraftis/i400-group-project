<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dodge the Falling Rocks</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #game-container {
        position: relative;
    }

    canvas {
        background: linear-gradient(#222, #000);
        border: 3px solid #fff;
        display: block;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 18px;
        font-weight: bold;
    }

    #game-over {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.8);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-size: 24px;
        text-align: center;
    }

    #game-over button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        background: #ff4444;
        color: white;
        border-radius: 5px;
    }

    #game-over button:hover {
        background: #ff2422;
    }
</style>
</head>

<body>

<div id="game-container">
    <canvas id="game" width="400" height="600"></canvas>
    <div id="score">Score: 0</div>

    <div id="game-over">
        <div id="final-score"></div>
        <button onclick="restartGame()">Play Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const gameOverScreen = document.getElementById("game-over");
    const finalScoreEl = document.getElementById("final-score");

    const player = {
        width: 40,
        height: 40,
        x: canvas.width / 2 - 20,
        y: canvas.height - 60,
        speed: 6
    };

    let rocks = [];
    let score = 0;
    let gameRunning = true;

    const keys = {
        left: false,
        right: false
    };

    document.addEventListener("keydown", e => {
        if (e.key === "ArrowLeft" || e.key === "a") keys.left = true;
        if (e.key === "ArrowRight" || e.key === "d") keys.right = true;
    });

    document.addEventListener("keyup", e => {
        if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;
        if (e.key === "ArrowRight" || e.key === "d") keys.right = false;
    });

    function spawnRock() {
        const size = Math.random() * 20 + 20;
        rocks.push({
            x: Math.random() * (canvas.width - size),
            y: -size,
            size: size,
            speed: Math.random() * 2 + 2
        });
    }

    function update() {
        if (!gameRunning) return;

        // Move player
        if (keys.left) player.x -= player.speed;
        if (keys.right) player.x += player.speed;

        // Clamp player to canvas
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

        // Update rocks
        for (let i = rocks.length - 1; i >= 0; i--) {
            rocks[i].y += rocks[i].speed;

            // Collision detection
            if (
                rocks[i].x < player.x + player.width &&
                rocks[i].x + rocks[i].size > player.x &&
                rocks[i].y < player.y + player.height &&
                rocks[i].y + rocks[i].size > player.y
            ) {
                endGame();
            }

            // Remove rocks off screen
            if (rocks[i].y > canvas.height) {
                rocks.splice(i, 1);
                score++;
            }
        }

        // Spawn rocks
        if (Math.random() < 0.03) spawnRock();

        scoreEl.textContent = "Score: " + score;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Player
        ctx.fillStyle = "#00ffcc";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Rocks
        ctx.fillStyle = "#ff5555";
        rocks.forEach(r => {
            ctx.beginPath();
            ctx.arc(r.x + r.size / 2, r.y + r.size / 2, r.size / 2, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function endGame() {
        gameRunning = false;
        finalScoreEl.textContent = "Game Over! Final Score: " + score;
        gameOverScreen.style.display = "flex";
    }

    function restartGame() {
        score = 0;
        rocks = [];
        player.x = canvas.width / 2 - player.width / 2;
        gameRunning = true;
        gameOverScreen.style.display = "none";
    }

    loop();
</script>

</body>
</html>
