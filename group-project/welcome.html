<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Bloomington Figure Skating Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            /* Override centering from index.html to allow full layout */
            justify-content: flex-start;
            align-items: flex-start;
        }

        .dashboard-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.4);
            z-index: 10;
            position: relative;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            height: 100%;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 56px;
            padding-left: 8px;
        }

        .sidebar-header svg {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 0 8px rgba(110, 231, 183, 0.4));
        }

        .sidebar-header h3 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: rgba(110, 231, 183, 0.1);
            color: var(--primary);
            border: 1px solid rgba(110, 231, 183, 0.2);
            box-shadow: 0 4px 12px rgba(110, 231, 183, 0.05);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .logout-btn {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 12px;
            color: #ef4444; /* red-500 */
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            transform: translateY(-2px);
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 64px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .welcome-header {
            margin-bottom: 48px;
        }

        .welcome-header h1 {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-header p {
            color: var(--text-muted);
            font-size: 18px;
        }

        .content-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 64px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease forwards;
        }

        .tab-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-icon svg {
            width: 40px;
            height: 40px;
            stroke: var(--accent);
            fill: none;
        }

        .content-card h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 16px;
        }

        .content-card p {
            color: var(--text-muted);
            font-size: 16px;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="background-container"></div>
    
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/>
                    <path d="M7 14L8.5 9.5L12 8L15.5 9.5L17 14"/>
                    <path d="M9 17.5L12 15L15 17.5"/>
                </svg>
                <h3>BFSC Portal</h3>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-item active" data-tab="ratings">
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                    Ratings
                </div>
                <div class="nav-item" data-tab="feedback">
                    <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    Feedback
                </div>
                <div class="nav-item" data-tab="navigations">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
                    Navigations
                </div>
            </nav>

            <a href="index.html" class="logout-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Log Out
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="welcome-header">
                <h1 id="welcomeText">Welcome!</h1>
                <p>Select an option from the sidebar to view your progress.</p>
            </div>

            <!-- Dynamic Content Area -->
            <div class="content-card" id="mainDisplay">
                <div class="tab-icon">
                    <svg id="dynamicIcon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                    </svg>
                </div>
                <h2 id="dynamicTitle">Student Ratings</h2>
                <p id="dynamicDesc">You have no new ratings at this time. Complete a test session with a coach to see your score!</p>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup welcome text from URL params
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            const welcomeText = document.getElementById('welcomeText');
            if (name) {
                welcomeText.textContent = `Welcome, ${name}!`;
            } else {
                welcomeText.textContent = 'Welcome, Skater!';
            }

            // Tab Content Data
            const tabData = {
                ratings: {
                    title: "Student Ratings",
                    desc: "You have no new ratings at this time. Complete a test session with a coach to see your score!",
                    icon: '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>'
                },
                feedback: {
                    title: "Coach Feedback",
                    desc: "Keep up the good work on your edges! Your coach will leave written feedback here after your next evaluation.",
                    icon: '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>'
                },
                navigations: {
                    title: "Rink Navigations",
                    desc: "View upcoming schedules, sign up for private ice time, and navigate the Bloomington rink map.",
                    icon: '<circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>'
                }
            };

            // Setup Navigation Tab Logic
            const navItems = document.querySelectorAll('.nav-item');
            const dynamicTitle = document.getElementById('dynamicTitle');
            const dynamicDesc = document.getElementById('dynamicDesc');
            const dynamicIcon = document.getElementById('dynamicIcon');
            const mainDisplay = document.getElementById('mainDisplay');

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    // Remove active class from all
                    navItems.forEach(nav => nav.classList.remove('active'));
                    // Add active class to clicked
                    item.classList.add('active');
                    
                    // Fetch data
                    const tabKey = item.getAttribute('data-tab');
                    const info = tabData[tabKey];

                    // Trigger fade animation by removing & re-adding the element
                    mainDisplay.style.animation = 'none';
                    void mainDisplay.offsetWidth; // trigger reflow
                    
                    // Update content
                    dynamicTitle.textContent = info.title;
                    dynamicDesc.textContent = info.desc;
                    dynamicIcon.innerHTML = info.icon;

                    mainDisplay.style.animation = 'fadeIn 0.5s ease forwards';
                });
            });
        });
    </script>
</body>
</html>
